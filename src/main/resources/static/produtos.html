<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Share+Tech&display=swap" rel="stylesheet">
</head>
<body>
  <div id="navbar"></div>


<div class="container-fluid mt-5 pt-4">
  <div class="row">


    <div class="col-md-8" >

   <h2 id="Titulo-Principal" >📦 Produtos</h2>

      <div class="tabela-scroll">
        <table class="table table-dark table-hover table-striped text-center">
          
          <thead class="table-success text-dark">
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Valor</th>
              <th>Qtd</th>
              <th>Excluir</th>
            </tr>
          </thead>

          <tbody id="produto-tbody"></tbody>

        </table>
      </div>

    </div>

            <div class="col-md-3">
                <div class="dashboard-card alerta mb-4">
                    <div class="card-content">
                        <div>
                            <p class="text">Dica de Gestão</p>
                            <h6 class="text-white mt-2">Mantenha seu estoque sempre acima de 5 unidades para evitar rupturas.</h6>
                        </div>
                        <i class="bi bi-lightbulb icon" style="font-size: 30px;"></i>
                    </div>
                </div>

               <div class="dashboard-card produtos" id="card-status">
    <div class="card-content d-block text-center">
        <i id="status-icon" class="bi bi-cloud-check text-success display-4 mb-3"></i>
        <p class="text">Sincronização</p>
        <h5 id="status-text" class="text-white">Verificando...</h5>
        <small id="status-time" class="text-secondary">Última atualização: --:--</small>
    </div>
</div>
            </div>
  </div>
</div>

<div class="modal fade" id="modalCadastro" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Novo Produto</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form id="formCadastro">
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Nome</label>
            <input type="text" id="nome" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Valor</label>
            <input type="number" step="0.01" id="valor" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Quantidade</label>
            <input type="number" id="quantidade" class="form-control" required>
          </div>
        </div>
        <div class="modal-footer border-secondary">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
          <button type="submit" class="btn btn-primary">Salvar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal fade" id="modalListaEdicao" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Selecione o Produto para Editar</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <ul id="lista-para-editar" class="list-group list-group-flush">
            </ul>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Editando Produto</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <form id="formEditar">
        <input type="hidden" id="edit-id">
        <div class="modal-body">
          <div class="mb-3">
            <label>Nome</label>
            <input type="text" id="edit-nome" class="form-control" required>
          </div>
          <div class="mb-3">
            <label>Valor</label>
            <input type="number" step="0.01" id="edit-valor" class="form-control" required>
          </div>
          <div class="mb-3">
            <label>Quantidade</label>
            <input type="number" id="edit-quantidade" class="form-control" required>
          </div>
        </div>
        <div class="modal-footer border-secondary">
          <button type="submit" class="btn btn-warning">Salvar Alterações</button>
        </div>
      </form>
    </div>
  </div>
</div>




<script src="script.js"></script>

   <script>
fetch('navbar.html')
  .then(res => {
    if (!res.ok) {
      throw new Error('Erro ao carregar navbar');
    }
    return res.text();
  })
  .then(data => {
    document.getElementById('navbar').innerHTML = data;
  })
  .catch(error => {
    console.error(error);
  });
</script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

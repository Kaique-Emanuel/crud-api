<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/shared/style-common.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Share+Tech&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/login/login.css">
    
</head>
<body>

<div class="login-wrapper">

    <div class="system-header">
        <div class="system-icon"><i class="bi bi-boxes"></i></div>
        <div class="system-name">Sistema de Estoque</div>
        <div class="system-sub">Controle de Inventário</div>
    </div>

    <div class="login-card">
        <p class="card-title">Acesse sua conta</p>

        <div class="error-msg" id="errorMsg">
            <i class="bi bi-exclamation-circle"></i>
            <span>Usuário ou senha inválidos.</span>
        </div>

        <form method="POST" action="/login" id="loginForm">

            <div class="input-group-custom">
                <label for="username">Usuário</label>
                <div class="input-wrap">
                    <input type="text" id="username" name="username" placeholder="seu usuário" required autocomplete="username">
                    <i class="bi bi-person"></i>
                </div>
            </div>

            <div class="input-group-custom">
                <label for="password">Senha</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    <i class="bi bi-lock"></i>
                    <i class="bi bi-eye toggle-password" id="togglePwd"></i>
                </div>
            </div>

            <div class="forgot-link">
                <a href="#" data-bs-toggle="modal" data-bs-target="#modalEsqueciSenha">Esqueci minha senha</a>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <span id="btnText">ENTRAR</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>

        </form>

        <div class="divider"><span>OU</span></div>

        <div class="register-link">
            Não tem conta? <a href="/cadastro/cadastro.html">Criar conta</a>
        </div>
    </div>

    <div class="login-footer">SISTEMA DE ESTOQUE &nbsp;·&nbsp; v1.0</div>
</div>

<div class="modal fade" id="modalEsqueciSenha" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content reset-modal">
            <div class="modal-header">
                <h5 class="modal-title">Redefinir senha</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="error-msg" id="resetMsg">
                    <i class="bi bi-info-circle"></i>
                    <span id="resetMsgText"></span>
                </div>
                <div class="input-group-custom">
                    <label for="resetLogin">Usuário</label>
                    <div class="input-wrap">
                        <input type="text" id="resetLogin" placeholder="seu usuário" autocomplete="username">
                        <i class="bi bi-person"></i>
                    </div>
                </div>
                <div class="input-group-custom">
                    <label for="resetEmail">E-mail do usuário</label>
                    <div class="input-wrap">
                        <input type="email" id="resetEmail" placeholder="seu@email.com" autocomplete="email">
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>
                <button type="button" class="btn-login" id="btnResetEmail" onclick="solicitarResetSenha()">SOLICITAR RESET</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const togglePwd = document.getElementById('togglePwd');
        const pwdInput  = document.getElementById('password');

        if (togglePwd && pwdInput) {
            togglePwd.addEventListener('click', () => {
                const isHidden = pwdInput.type === 'password';
                pwdInput.type = isHidden ? 'text' : 'password';
                togglePwd.className = isHidden
                    ? 'bi bi-eye-slash toggle-password'
                    : 'bi bi-eye toggle-password';
                togglePwd.setAttribute('aria-label', isHidden ? 'Ocultar senha' : 'Mostrar senha');
            });
        }

        const loginForm = document.getElementById('loginForm');
        if (loginForm) {
            loginForm.addEventListener('submit', () => {
                document.getElementById('btnText').style.display   = 'none';
                document.getElementById('btnSpinner').style.display = 'block';
            });
        }

        if (window.location.search.includes('error')) {
            document.getElementById('errorMsg').classList.add('show');
        }
    });

    async function solicitarResetSenha() {
        const login = document.getElementById('resetLogin').value.trim();
        const email = document.getElementById('resetEmail').value.trim();
        const msg = document.getElementById('resetMsg');
        const msgText = document.getElementById('resetMsgText');
        const btn = document.getElementById('btnResetEmail');

        if (!login || !email) {
            msgText.innerText = 'Informe seu usuário e e-mail cadastrados.';
            msg.className = 'error-msg show';
            return;
        }

        btn.disabled = true;
        btn.innerText = 'SOLICITANDO...';

        try {
            const res = await fetch('/usuario/esqueci-senha', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ login, email })
            });

            const contentType = res.headers.get('content-type') || '';
            if (!contentType.includes('application/json')) {
                const text = await res.text();
                if (text.includes('<html') || text.includes('<!DOCTYPE html')) {
                    throw new Error('O servidor retornou uma página HTML. Reinicie a aplicação Spring para carregar o endpoint de reset.');
                }
                throw new Error(`Resposta inesperada do servidor (${res.status}).`);
            }

            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.mensagem || `Erro ${res.status} ao solicitar reset.`);
            }

            msgText.innerText = data.mensagem || 'Se os dados estiverem corretos, um administrador verá sua solicitação.';
            msg.className = 'error-msg success show';
        } catch (error) {
            msgText.innerText = error.message || 'Não foi possível solicitar o reset agora.';
            msg.className = 'error-msg show';
        } finally {
            btn.disabled = false;
            btn.innerText = 'SOLICITAR RESET';
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/shared/style-common.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Share+Tech&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/login/login.css">
    
</head>
<body>

<div class="login-wrapper">

    <div class="system-header">
        <div class="system-icon"><i class="bi bi-boxes"></i></div>
        <div class="system-name">Sistema de Estoque</div>
        <div class="system-sub">Controle de Inventário</div>
    </div>

    <div class="login-card">
        <p class="card-title">Acesse sua conta</p>

        <div class="error-msg" id="errorMsg">
            <i class="bi bi-exclamation-circle"></i>
            <span>Usuário ou senha inválidos.</span>
        </div>

        <form method="POST" action="/login" id="loginForm">

            <div class="input-group-custom">
                <label for="username">Usuário</label>
                <div class="input-wrap">
                    <input type="text" id="username" name="username" placeholder="seu usuário" required autocomplete="username">
                    <i class="bi bi-person"></i>
                </div>
            </div>

            <div class="input-group-custom">
                <label for="password">Senha</label>
                <div class="input-wrap">
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    <i class="bi bi-lock"></i>
                    <i class="bi bi-eye toggle-password" id="togglePwd"></i>
                </div>
            </div>

            <div class="forgot-link">
                <a href="#" data-bs-toggle="modal" data-bs-target="#modalEsqueciSenha">Esqueci minha senha</a>
            </div>

            <button type="submit" class="btn-login" id="btnLogin">
                <span id="btnText">ENTRAR</span>
                <div class="spinner" id="btnSpinner"></div>
            </button>

        </form>

        <div class="divider"><span>OU</span></div>

        <div class="register-link">
            Não tem conta? <a href="/cadastro/cadastro.html">Criar conta</a>
        </div>
    </div>

    <div class="login-footer">SISTEMA DE ESTOQUE &nbsp;·&nbsp; v1.0</div>
</div>

<div class="modal fade" id="modalEsqueciSenha" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content reset-modal">
            <div class="modal-header">
                <h5 class="modal-title">Redefinir senha</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="error-msg" id="resetMsg">
                    <i class="bi bi-info-circle"></i>
                    <span id="resetMsgText"></span>
                </div>
                <div class="input-group-custom">
                    <label for="resetLogin">Usuário</label>
                    <div class="input-wrap">
                        <input type="text" id="resetLogin" placeholder="seu usuário" autocomplete="username">
                        <i class="bi bi-person"></i>
                    </div>
                </div>
                <div class="input-group-custom">
                    <label for="resetEmail">E-mail do usuário</label>
                    <div class="input-wrap">
                        <input type="email" id="resetEmail" placeholder="seu@email.com" autocomplete="email">
                        <i class="bi bi-envelope"></i>
                    </div>
                </div>
                <button type="button" class="btn-login" id="btnResetEmail" onclick="solicitarResetSenha()">SOLICITAR RESET</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/login/login.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Sistema de Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Share+Tech&display=swap" rel="stylesheet">
</head>

<body>
  
    <div id="navbar"></div>

    <div id="titulo">
       <h1 id="Titulo-Principal">Dashboard</h1>
        <p id="Sub-Titulo">Visão geral do sistema</p>
       <span id="Status">Verificando...</span>
    </div>

    <div id="cards">
        <div class="card dashboard-card produtos">
            <div class="card-content">
                <div>
                    <p class="text">Produtos</p>
                    <h3 data-target="total-produtos">0</h3> </div>
                <i class="bi bi-boxes icon"></i>
            </div>
        </div>

        <div class="card dashboard-card alerta">
            <div class="card-content">
                <div>
                    <p class="text">Estoque Baixo</p>
                    <h3 data-target="estoque-baixo">0</h3> </div>
                <i class="bi bi-exclamation-triangle icon"></i>
            </div>
        </div>

        <div class="card dashboard-card valor">
            <div class="card-content">
                <div>
                    <p class="text">Valor Total</p>
                    <h3 id="valorTotal">R$ 0,00</h3> </div>
                <i class="bi bi-currency-dollar icon"></i>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalCadastro" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Novo Produto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="formCadastro">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nome</label>
                            <input type="text" id="nome" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Valor</label>
                            <input type="number" step="0.01" id="valor" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Quantidade</label>
                            <input type="number" id="quantidade" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
                        <button type="submit" class="btn btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalListaEdicao" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Selecione o Produto para Editar</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <ul id="lista-para-editar" class="list-group list-group-flush"></ul>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Editando Produto</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="formEditar">
                    <input type="hidden" id="edit-id">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label>Nome</label>
                            <input type="text" id="edit-nome" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Valor</label>
                            <input type="number" step="0.01" id="edit-valor" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label>Quantidade</label>
                            <input type="number" id="edit-quantidade" class="form-control" required>
                        </div>
                    </div>
                    <div class="modal-footer border-secondary">
                        <button type="submit" class="btn btn-warning">Salvar Alterações</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Carrega a Navbar
        fetch('navbar.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('navbar').innerHTML = data;
            })
            .catch(error => console.error('Erro ao carregar navbar:', error));
    </script>

    <script src="script.js"></script>
</body>
</html>

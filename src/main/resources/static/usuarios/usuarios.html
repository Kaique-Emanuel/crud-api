<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários - Sistema de Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Share+Tech&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/style-common.css">
    <link rel="stylesheet" href="/usuarios/usuario.css">
</head>
<body>

    <div id="navbar"></div>

    <div id="titulo">
        <div>
            <h1>Usuários <span>·</span> Admin</h1>
            <p>Gerencie os usuários do sistema</p>
        </div>
        <span class="badge-total" id="badge-total">0 USUÁRIOS</span>
    </div>

    <div class="filtros">
        <button class="filtro-btn ativo" onclick="filtrar('todos', this)">Todos</button>
        <button class="filtro-btn" onclick="filtrar('ADMIN', this)">Admins</button>
        <button class="filtro-btn" onclick="filtrar('USER', this)">Usuários</button>
    </div>

    <div id="grid-usuarios"></div>

    <!-- Modal Editar -->
    <div class="modal fade" id="modalEditar" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-white">
                <div class="modal-header">
                    <h5 class="modal-title" style="font-family:'Archivo Black',sans-serif;">Editar Usuário</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-id">
                    <div class="mb-3">
                        <label class="form-label">Login</label>
                        <input type="text" id="edit-login" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">E-mail</label>
                        <input type="email" id="edit-email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Role</label>
                        <select id="edit-role" class="form-select">
                            <option value="USER">USER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nova senha</label>
                        <div class="input-group">
                            <input type="text" id="edit-senha" class="form-control" placeholder="Deixe vazio para manter a senha atual">
                            <button type="button" class="btn btn-outline-success" onclick="preencherSenhaGerada()">
                                <i class="bi bi-magic"></i>
                            </button>
                        </div>
                    </div>
                    <div class="admin-reset-box">
                        <button type="button" class="btn-reset-admin" onclick="gerarSenhaTemporaria()">
                            <i class="bi bi-key"></i> Gerar senha temporária
                        </button>
                        <div id="senha-gerada-box" class="senha-gerada-box"></div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button class="btn-salvar" onclick="salvarEdicao()">Salvar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="/usuarios/usuario.js"></script>

</body>
</html>

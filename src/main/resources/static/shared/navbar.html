<div class="modal fade" id="modalAlterarSenha" tabindex="-1" aria-hidden="true" style="z-index: 2100;">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content bg-dark text-white border-secondary shadow-lg">
      <div class="modal-header border-secondary">
        <h5 class="modal-title">Alterar senha</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="alert alert-danger d-none" id="senha-erro"></div>
        <div class="alert alert-success d-none" id="senha-sucesso"></div>

        <div class="mb-3">
          <label class="form-label">Senha atual</label>
          <div class="position-relative">
            <input type="password" id="senha-atual" class="form-control pe-5" autocomplete="current-password">
            <i class="bi bi-eye toggle-password position-absolute top-50 end-0 translate-middle-y pe-3" id="toggle-senha-atual" role="button" aria-label="Mostrar senha"></i>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Nova senha</label>
          <div class="position-relative">
            <input type="password" id="nova-senha" class="form-control pe-5" autocomplete="new-password">
            <i class="bi bi-eye toggle-password position-absolute top-50 end-0 translate-middle-y pe-3" id="toggle-nova-senha" role="button" aria-label="Mostrar nova senha"></i>
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Confirmar nova senha</label>
          <div class="position-relative">
            <input type="password" id="confirmar-nova-senha" class="form-control pe-5" autocomplete="new-password">
            <i class="bi bi-eye toggle-password position-absolute top-50 end-0 translate-middle-y pe-3" id="toggle-confirmar-nova-senha" role="button" aria-label="Mostrar confirmação de senha"></i>
          </div>
        </div>
      </div>
      <div class="modal-footer border-secondary">
        <button type="button" class="btn btn-secondary" data-bs-target="#modalPerfil" data-bs-toggle="modal">Voltar</button>
        <button type="button" class="btn btn-primary" onclick="alterarMinhaSenha()">Salvar senha</button>
      </div>
    </div>
  </div>
</div>

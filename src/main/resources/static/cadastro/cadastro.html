<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Sistema de Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Share+Tech&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/cadastro/cadastro.css">
    <style>

    </style>
</head>
<body>

<div class="cadastro-wrapper">

    <div class="system-header">
        <div class="system-icon"><i class="bi bi-person-plus"></i></div>
        <div class="system-name">Sistema de Estoque</div>
        <div class="system-sub">Criar nova conta</div>
    </div>

    <div class="cadastro-card">
        <p class="card-title">Preencha seus dados</p>

        <div class="alert-msg erro" id="alertErro">
            <i class="bi bi-exclamation-circle"></i>
            <span id="alertErroTexto">Erro ao cadastrar.</span>
        </div>

        <div class="alert-msg sucesso" id="alertSucesso">
            <i class="bi bi-check-circle"></i>
            <span>Conta criada com sucesso! Redirecionando...</span>
        </div>

      
        <div class="input-group-custom">
            <label for="login">Usuário</label>
            <div class="input-wrap">
                <input type="text" id="login" placeholder="seu usuário" required autocomplete="username">
                <i class="bi bi-person icon-left"></i>
            </div>
        </div>

        <div class="input-group-custom">
            <label for="email">E-mail</label>
            <div class="input-wrap">
                <input type="email" id="email" placeholder="seu@email.com" required autocomplete="email">
                <i class="bi bi-envelope icon-left"></i>
            </div>
        </div>

        <div class="input-group-custom">
            <label for="senha">Senha</label>
            <div class="input-wrap">
                <input type="password" id="senha" placeholder="mínimo 6 caracteres" required autocomplete="new-password">
                <i class="bi bi-lock icon-left"></i>
                <i class="bi bi-eye toggle-password" id="toggleSenha"></i>
            </div>
            <div class="senha-forca-wrapper">
                <div class="senha-forca-barra">
                    <div class="senha-forca-fill" id="forcaFill"></div>
                </div>
                <span class="senha-forca-texto" id="forcaTexto"></span>
            </div>
        </div>

     
        <div class="input-group-custom">
            <label for="confirmarSenha">Confirmar Senha</label>
            <div class="input-wrap">
                <input type="password" id="confirmarSenha" placeholder="repita a senha" required autocomplete="new-password">
                <i class="bi bi-lock-fill icon-left"></i>
                <i class="bi bi-eye toggle-password" id="toggleConfirmar"></i>
            </div>
            <div class="field-msg" id="msg-confirmar"></div>
        </div>

        <button class="btn-cadastro" id="btnCadastro" onclick="cadastrar()" >
            <span id="btnTexto">CRIAR CONTA</span>
            <div class="spinner" id="btnSpinner"></div>
        </button>

        <div class="divider"><span>OU</span></div>

        <div class="login-link">
            Já tem conta? <a href="/login/login.html">Fazer login</a>
        </div>
    </div>

    <div class="cadastro-footer">SISTEMA DE ESTOQUE &nbsp;·&nbsp; v1.0</div>
</div>
<script src="/cadastro/cadastro.js"></script>
</body>
</html>
